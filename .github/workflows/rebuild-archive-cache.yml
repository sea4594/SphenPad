name: Rebuild Archive Cache From Scratch

on:
  workflow_dispatch:
    inputs:
      push_changes:
        description: Commit and push regenerated cache files
        required: true
        default: true
        type: boolean
      commit_message:
        description: Commit message for regenerated cache files
        required: false
        default: "chore: rebuild archive cache from scratch"
        type: string

permissions:
  contents: write

concurrency:
  group: rebuild-archive-cache-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Wipe archive cache files
        run: |
          rm -rf public/archive/puzzles
          rm -f public/archive/archive-manifest.json

      - name: Regenerate archive cache
        run: npm run sync-archive-cache

      - name: Detect data changes
        id: data_changes
        run: |
          if [[ -n "$(git status --porcelain -- public/archive/archive-manifest.json public/archive/puzzles)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push regenerated cache files
        if: inputs.push_changes && steps.data_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/archive/archive-manifest.json public/archive/puzzles
          git commit -m "${{ inputs.commit_message }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: No-op when nothing changed
        if: steps.data_changes.outputs.changed != 'true'
        run: echo "Archive cache is already up to date."
